<!DOCTYPE HTML>
<html>
  <head>Xikiya!</head>
  <body>
    <svg xmlns="http://w3.org" viewBox="0 0 300 150" width="100%" height="100%">
      <defs>
        <!-- Sombra para dar efecto de profundidad -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="8" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
        </filter>
        
        <!-- Esquinas redondeadas -->
        <clipPath id="clip-round">
          <rect x="25" y="25" width="250" height="100" rx="15" ry="15" />
        </clipPath>
      </defs>
    
      <style>
        .boton {
          cursor: pointer;
          transition: transform 0.1s ease, filter 0.1s ease;
        }
        
        /* Efecto al presionar (hundido) */
        .boton:active {
          transform: translateY(6px);
          filter: drop-shadow(0 2px 2px rgba(0,0,0,0.4));
        }
        
        .texto-boton {
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          font-size: 20px;
          fill: #ffffff;
          font-weight: bold;
          pointer-events: none; /* Evita que el texto interfiera con el clic */
        }
      </style>
    
      <!-- Grupo principal del botón -->
      <g class="boton">
        <!-- Capa de sombra separada para que no se mueva con el ícono -->
        <rect x="25" y="25" width="250" height="100" rx="15" ry="15" fill="#2E7D32" filter="url(#shadow)" />
        
        <!-- Cuerpo principal del botón -->
        <rect x="25" y="25" width="250" height="100" rx="15" ry="15" fill="#4CAF50" />
        
        <!-- Imagen / Ícono (Ejemplo: Logo de estrella) -->
        <g transform="translate(50, 40)">
          <polygon points="25,0 32,15 49,18 37,30 40,47 25,39 9,47 13,30 1,18 18,15" fill="#FFD54F" />
        </g>
    
        <!-- Texto del botón -->
        <text x="110" y="87" class="texto-boton">¡Presióname!</text>
      </g>
    </svg>
    
  </body>
</html>
